# 商家端静态站示例（按环境复制到 nginx conf.d）
# 部署目录需与 Jenkins 参数 NGINX_STATIC_DIR 一致

# dev 商家端（域名示例，按实际修改）
server {
    listen 80;
    server_name dev-merchant.monihr.com;

    root /var/www/moni-merchant-dev;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

